<!-- keep this site unlisted: ask search engines not to index it -->
<meta name="robots" content="noindex, nofollow" />

<!-- ═══ ancient-Greek-digital theme — shared bundle at /theme/ (built by pipeline/build-theme.mjs) ═══ -->
<link rel="icon" href="/theme/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/theme/apple-touch-icon.png" />
<script>try{var _t=localStorage.getItem('cosmos-theme');if(_t&&_t!=='dark')document.documentElement.setAttribute('data-theme',_t)}catch(e){}</script>
<link rel="stylesheet" href="/theme/theme.css" />
<style>
  /* neutralize the old cream sweetb-hugo skin so the dark theme shows through */
  html{background:var(--void)!important}
  body{background:transparent!important;color:var(--bone)!important;height:auto!important;min-height:100vh;font-size:19px}
  .container,.container-fluid,.intro-header,footer{background:transparent!important;color:var(--bone)!important}
  .container{text-align:left!important}
  nav,.navbar-custom,.navbar-brand,nav a,nav .container-fluid{background:transparent!important}
  nav a,.navbar-custom{color:var(--btn)!important;font-family:'Aegean',Georgia,serif!important;text-transform:uppercase;letter-spacing:.12em}
  .navbar-brand{color:var(--gold)!important;font-family:'Spartacus',serif!important}
  a{color:var(--btn)!important}
  h3{font-size:1.3rem!important}
  /* keep the carousel, hide its prev/next chrome */
  .carousel{margin-bottom:35px}
  body .carousel .prev,body .carousel .next{display:none!important;visibility:hidden}
</style>
<script src="/theme/theme.js" defer></script>
