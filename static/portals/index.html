<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/theme/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/theme/apple-touch-icon.png" />
  <script>try{var _t=localStorage.getItem('cosmos-theme');if(_t&&_t!=='dark')document.documentElement.setAttribute('data-theme',_t)}catch(e){}</script>
  <link rel="stylesheet" href="/theme/theme.css" />
  <title>Portals — Anthony Carrella</title>
  <style>
    /* the colonnade menu — same as Palimpsest, so it persists across both pages */
    nav { display: flex; justify-content: center; gap: 42px; padding: 42px 0 8px; flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; align-items: center; gap: 50px; text-decoration: none; }
    .colglyph { font-family: 'Columns'; font-size: 3rem; line-height: 1; color: var(--gold); text-shadow: 0 0 10px rgba(232,147,58,.4); transition: .3s; opacity: .82; }
    .col:hover .colglyph, .col.active .colglyph { color: var(--ember); text-shadow: 0 0 16px rgba(232,147,58,.8); opacity: 1; }
    .col .hud { font-family: ui-monospace, Menlo, monospace; font-size: .66rem; letter-spacing: .24em; text-transform: uppercase; color: var(--dim); }
    main { max-width: 640px; margin: 0 auto; padding: 5vh 8vw 15vh; text-align: center; }
    .eyebrow { font-family: ui-monospace, Menlo, monospace; font-size: .68rem; letter-spacing: .26em; text-transform: uppercase; color: var(--dim); margin-bottom: 22px; }
    h1 { font-size: clamp(2.8rem, 11vw, 5rem); margin-bottom: .18em; }
    .sub { font-family: ui-monospace, Menlo, monospace; font-size: .72rem; letter-spacing: .24em; text-transform: uppercase; color: var(--dim); margin-bottom: 3.2em; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 1.15em; }
    li a { font-family: 'Spartacus', serif; font-size: 1.6rem; letter-spacing: .04em; color: var(--gold); text-decoration: none; text-shadow: 0 0 12px rgba(232,147,58,.32); transition: .25s; display: inline-block; }
    li a:hover { color: var(--ember); text-shadow: 0 0 18px rgba(232,147,58,.7); }
    /* dissolve to charcoal when entering a portal — seamless into the room's boot veil */
    #nav-veil { position: fixed; inset: 0; z-index: 90; opacity: 0; pointer-events: none;
                background: radial-gradient(circle at 50% 46%, rgb(27,23,16) 0%, rgb(9,8,6) 70%);
                transition: opacity 0.55s ease; }
    #nav-veil.show { opacity: 1; pointer-events: auto; }
  </style>
</head>
<body>
  <div id="nav-veil"></div>
  <nav>
    <a class="col" href="/"><span class="colglyph">A</span><span class="hud">Palimpsest</span></a>
    <a class="col active" href="/portals/"><span class="colglyph">B</span><span class="hud">Portals</span></a>
  </nav>
  <main>
    <h1>Portals</h1>
    <div class="sub">enter a room</div>
    <ul>
        <li><a href="./portal.html?project=cosmology&amp;share=1&amp;frame=as-composed">The Cosmology</a></li>
        <li><a href="./portal.html?project=listening-b45a37&amp;share=1&amp;frame=as-composed">listening </a></li>
    </ul>
  </main>
  <script src="/theme/theme.js" defer></script>
  <script>
    document.querySelectorAll('main a').forEach(function (a) {
      a.addEventListener('click', function (e) {
        e.preventDefault();
        var href = a.href;
        document.getElementById('nav-veil').classList.add('show');
        setTimeout(function () { location.href = href; }, 520);   // dissolve, then navigate
      });
    });
  </script>
</body>
</html>
