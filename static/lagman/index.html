<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1416" id="meta-theme-color" />
  <meta name="robots" content="noindex, nofollow" />
  <script>
    /* No-flash theme: set data-theme before the stylesheet applies. */
    (function () {
      try {
        var t = localStorage.getItem('lagman-theme');
        if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
  <script>
    /* Self-heal: if the app hasn't booted a few seconds after load (e.g. a
       stale or mixed service-worker cache after a deploy), wipe the SW +
       caches once and reload fresh. Guarded so it can never loop. */
    window.addEventListener('load', function () {
      setTimeout(function () {
        var view = document.getElementById('view');
        if ((view && view.firstElementChild) || sessionStorage.getItem('lagman-healed')) return;
        try { sessionStorage.setItem('lagman-healed', '1'); } catch (e) { return; }
        Promise.resolve()
          .then(function () { return ('serviceWorker' in navigator) ? navigator.serviceWorker.getRegistrations() : []; })
          .then(function (regs) { return Promise.all(regs.map(function (r) { return r.unregister(); })); })
          .then(function () { return window.caches ? caches.keys() : []; })
          .then(function (keys) { return Promise.all(keys.map(function (k) { return caches.delete(k); })); })
          .then(function () { location.reload(); })
          .catch(function () { location.reload(); });
      }, 4000);
    });
  </script>
  <title>Lagman Log — Anthony Carrella</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icon.svg" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/archive" data-nav="archive">
      <span class="brand-mark" aria-label="Lagman Log"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="1" opacity="0.85"/><circle cx="12" cy="12" r="3" fill="var(--accent)"/></svg></span>
      <span class="brand-name">Lagman Log</span>
    </a>
    <div class="topbar-right">
      <nav class="topnav">
        <a href="#/archive" data-nav="archive">Archive</a>
        <a href="#/new" data-nav="new" class="nav-new">+ New</a>
        <a href="#/compare" data-nav="compare">Compare</a>
        <a href="#/export" data-nav="export">Export</a>
        <a href="/instruments/" class="nav-site" title="Back to Instruments">↖&#xFE0E; Instruments</a>
      </nav>
      <a class="theme-toggle iconlink" href="#/settings" title="Settings" aria-label="Settings">⚙</a>
      <button id="theme-toggle" class="theme-toggle" type="button" title="Toggle light / dark" aria-label="Toggle light or dark mode">☾</button>
    </div>
  </header>

  <main id="view" class="view"><!-- views render here --></main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
