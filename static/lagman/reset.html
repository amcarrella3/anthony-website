<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Lagman Log — Reset</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1416; color: #ece7db;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; text-align: center; }
    .box { padding: 32px; max-width: 34ch; line-height: 1.6; }
    .t { letter-spacing: 0.3em; text-transform: uppercase; font-size: 12px; color: #3fb0a6; margin-bottom: 14px; }
    p { color: #9ba3a2; font-size: 15px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="t">Lagman Log</div>
    <p id="msg">Cleaning the app's cache&hellip; your scored bowls are untouched.</p>
  </div>
  <script>
    /* Force-clean: unregister every service worker and delete every cache for
       this site, then load the app fresh. IndexedDB (the bowl archive) is
       deliberately NOT touched. */
    (function () {
      var done = function () { location.replace('./index.html?fresh=' + Date.now()); };
      Promise.resolve()
        .then(function () { return ('serviceWorker' in navigator) ? navigator.serviceWorker.getRegistrations() : []; })
        .then(function (regs) { return Promise.all(regs.map(function (r) { return r.unregister(); })); })
        .then(function () { return window.caches ? caches.keys() : []; })
        .then(function (keys) { return Promise.all(keys.map(function (k) { return caches.delete(k); })); })
        .then(function () { document.getElementById('msg').textContent = 'Done — loading the app fresh…'; })
        .then(function () { setTimeout(done, 400); })
        .catch(function () { setTimeout(done, 400); });
    })();
  </script>
</body>
</html>
